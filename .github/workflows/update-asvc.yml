name: Update asvc formula

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: write

concurrency:
  group: update-asvc-formula
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Render formula from the latest release
        run: ./scripts/update-asvc-formula.sh

      - name: Validate formula syntax
        run: ruby -c Formula/asvc.rb

      - name: Commit an updated formula
        run: |
          if git diff --quiet -- Formula/asvc.rb; then
            echo "Formula is already current"
            exit 0
          fi

          version=$(ruby -ne 'puts $1 if $_ =~ /version "([^"]+)"/' Formula/asvc.rb)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/asvc.rb
          git commit -m "asvc ${version}"
          git push
